services:
  api:
    image: ghcr.io/allumnifatec/alumni-backend:latest
    pull_policy: always
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MAX_AGE_COOKIES=${MAX_AGE_COOKIES}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_KEY=${CLOUDINARY_KEY}
      - CLOUDINARY_SECRET=${CLOUDINARY_SECRET}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED}
      - HOST=${HOST}
      # Aumenta o pool de threads de I/O do Node (padrão é 4).
      # Beneficia operações de crypto, fs e DNS usadas pela API.
      - UV_THREADPOOL_SIZE=16
      # Limita o heap do Node a 1 GB — evita que o GC fique travando
      # sob carga alta e que o container ultrapasse o limite de memória.
      - NODE_OPTIONS=--max-old-space-size=1024
    deploy:
      resources:
        limits:
          # 1.5 vCPU para a API; os outros 0.5 ficam para APP + Redis + SO.
          cpus: '1.5'
          # 1.5 GB de RAM para a API.
          memory: 1536M
        reservations:
          cpus: '0.25'
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Configurações de performance e persistência para o Redis.
    # - maxmemory: teto de 256 MB; acima disso descarta keys menos usadas (LRU).
    # - save: persiste snapshot a cada 60s se houver ≥1 escrita (adequado para filas BullMQ).
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
